<a
  class="chat-item-link"
  [routerLink]="['/chat', chat().id]"
  routerLinkActive="active"
>
  <div class="avatar" [class]="'av-' + (chat().participant.userId | slice: 1)">
    {{ chat().participant.userName.charAt(0).toUpperCase() }}
    @if (chat().participant.isOnline) {
      <span class="online-dot" data-testid="online-indicator"></span>
    }
  </div>

  <div class="info">
    <div class="name-row">
      <span class="name" data-testid="chat-name">{{ chat().participant.userName }}</span>
      <span class="time">{{ chat().lastMessage.createdAt | date: 'HH:mm' }}</span>
    </div>
    <span class="preview" data-testid="chat-preview">{{ chat().lastMessage.text }}</span>
  </div>

  @if (chat().unreadCount > 0) {
    <span class="badge" data-testid="unread-badge">{{ chat().unreadCount }}</span>
  }
</a>
