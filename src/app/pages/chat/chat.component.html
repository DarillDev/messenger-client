<div class="chat-window">
  @if (activeChat(); as chat) {
    <header class="chat-header">
      <div class="chat-header-info">
        <button
          type="button"
          class="chat-header-avatar"
          data-testid="participant-avatar"
          (click)="openParticipantProfile(chat.participant.userId)"
        >
          {{ chat.participant.userName.charAt(0).toUpperCase() }}
        </button>

        <div>
          <div class="chat-header-name">{{ chat.participant.userName }}</div>
          @if (chat.participant.isOnline) {
            <div class="chat-header-status">В сети</div>
          } @else {
            <div class="chat-header-status offline">Не в сети</div>
          }
        </div>
      </div>
    </header>
  }

  <app-messages-list
    [items]="messageItems()"
    [isAppend]="isAppend()"
    [typingUsers]="typingUsers()"
  />

  <form class="msg-input-area" (submit)="onSubmit($event)">
    <div class="msg-input-wrapper">
      <textarea
        class="msg-input"
        placeholder="Написать сообщение..."
        rows="1"
        data-testid="message-input"
        [value]="messageText()"
        (input)="onInput($event)"
        (keydown)="onKeydown($event)"
      ></textarea>
    </div>

    <button
      type="submit"
      class="msg-send-btn"
      data-testid="send-button"
      [disabled]="!messageText().trim()"
    >
      <span class="material-icons-round">send</span>
    </button>
  </form>
</div>
