<cdk-virtual-scroll-viewport class="messages-viewport">
  <ng-container *cdkVirtualFor="let item of items(); trackBy: trackItem">
    @if (item.type === 'divider') {
      <div class="scroll-item scroll-item--divider">
        <ui-kit-date-divider [date]="item.date" />
      </div>
    } @else {
      <div class="scroll-item scroll-item--message">
        <ui-kit-message-bubble [message]="item" />
      </div>
    }
  </ng-container>
</cdk-virtual-scroll-viewport>

@if (typingUsers().length > 0) {
  <div class="typing-indicator" data-testid="typing-indicator">
    <div class="typing-dots"><i></i><i></i><i></i></div>
    <span>печатает...</span>
  </div>
}
