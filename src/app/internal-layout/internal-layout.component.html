<div class="left-panel">
  @if (!leftOutletActive()) {
    <app-sidebar />
  }

  <router-outlet
    [name]="routerOutletEnum.Left"
    (activate)="onLeftActivate()"
    (deactivate)="onLeftDeactivate()"
  />
</div>

<main>
  <router-outlet />
</main>

<div class="right-panel" [class.right-panel--open]="rightPanelActive()">
  <router-outlet
    [name]="routerOutletEnum.Right"
    (activate)="onRightActivate()"
    (deactivate)="onRightDeactivate()"
  />
</div>
